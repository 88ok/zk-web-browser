name: Java Maven Build and Release

# 触发条件：当推送形如 v1.0.0, v2.1.3 的 tag 时触发
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # 授予工作流写入 Release 的权限
    permissions:
      contents: write

    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 JDK 环境（这里以 JDK 17 为例，可根据你的项目修改）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # 开启 maven 缓存，加速后续构建

    # 3. 使用 Maven 编译并打包
    - name: Build with Maven
      run: mvn clean package -DskipTests # -DskipTests 可选，跳过测试以加快打包速度

    # 4. 找到打包后的 jar 文件并重命名/准备（可选步骤，方便发布）
    # Maven 默认打包在 target 目录下
    - name: Prepare Release Artifacts
      run: |
        mkdir -p release-artifacts
        cp target/*.jar release-artifacts/
        echo "Artifacts prepared:"
        ls -l release-artifacts/

    # 5. 创建 GitHub Release 并上传 JAR 包
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # 发布的名称，使用当前 tag 名
        name: Release ${{ github.ref_name }}
        # 自动生成 Release 日志（对比上一个版本的 commit 差异）
        generate_release_notes: true
        # 要上传的文件支持通配符
        files: |
          release-artifacts/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 这是一个内置变量，无需手动配置
